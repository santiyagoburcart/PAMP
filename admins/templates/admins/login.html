<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — PAMP</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #6366f1; --accent2: #8b5cf6;
      --glass: rgba(255,255,255,0.07); --glass-border: rgba(255,255,255,0.12);
      --text: #f1f5f9; --muted: rgba(241,245,249,0.5);
      --radius: 16px; --radius-sm: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(99,102,241,0.35) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(139,92,246,0.25) 0%, transparent 50%),
        linear-gradient(135deg, #0a0a1a 0%, #0d0d2b 50%, #0a1628 100%);
      color: var(--text);
    }
    .card {
      background: var(--glass);
      backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 40px;
      width: 380px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }
    .logo {
      display: flex; align-items: center; gap: 12px;
      justify-content: center; margin-bottom: 32px;
    }
    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 30px rgba(99,102,241,0.5);
    }
    .logo-text { font-size: 22px; font-weight: 700; background: linear-gradient(135deg, #fff, rgba(255,255,255,0.7)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo-sub { font-size: 11px; color: var(--muted); text-align: center; margin-top: -24px; margin-bottom: 28px; }
    label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 6px; }
    .field { margin-bottom: 18px; }
    input[type=text], input[type=password] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 11px 16px; font-size: 14px; font-family: 'Inter', sans-serif;
      outline: none; transition: all .2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
    input::placeholder { color: var(--muted); }
    .btn {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600; cursor: pointer;
      margin-top: 8px; transition: all .2s;
      box-shadow: 0 4px 20px rgba(99,102,241,0.4);
    }
    .btn:hover { box-shadow: 0 6px 25px rgba(99,102,241,0.6); transform: translateY(-1px); }
    .btn:active { transform: scale(.98); }
    .error-msg {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--radius-sm);
      color: #fca5a5; font-size: 13px;
      padding: 10px 14px; margin-bottom: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">⬡</div>
      <span class="logo-text">PAMP</span>
    </div>
    <div class="logo-sub">Pasargad Admins Management Panel</div>

    {% if form.errors %}
      <div class="error-msg">Invalid username or password. Please try again.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label for="id_username">Username</label>
        <input type="text" name="username" id="id_username" placeholder="Enter username" autofocus>
      </div>
      <div class="field">
        <label for="id_password">Password</label>
        <input type="password" name="password" id="id_password" placeholder="Enter password">
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit" class="btn">Sign In →</button>
    </form>
  </div>
</body>
</html>
