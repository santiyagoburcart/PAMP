<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PAMP — Pasargad Admins Management Panel{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #0f1117; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: #1a1d2e !important; border-bottom: 1px solid #2d3050; }
    .navbar-brand { color: #7c3aed !important; font-weight: 700; font-size: 1.3rem; }
    .sidebar { background: #1a1d2e; min-height: calc(100vh - 56px); border-right: 1px solid #2d3050; }
    .nav-link { color: #94a3b8; border-radius: 8px; margin: 2px 0; }
    .nav-link:hover, .nav-link.active { background: #2d3050; color: #c4b5fd; }
    .card { background: #1a1d2e; border: 1px solid #2d3050; border-radius: 12px; }
    .card-header { background: #12152a; border-bottom: 1px solid #2d3050; }
    .stat-card { border-left: 4px solid; }
    .stat-purple { border-color: #7c3aed; }
    .stat-blue { border-color: #3b82f6; }
    .stat-green { border-color: #10b981; }
    .stat-red { border-color: #ef4444; }
    .stat-value { font-size: 1.8rem; font-weight: 700; }
    .table { color: #e2e8f0; }
    .table thead { background: #12152a; }
    .table tbody tr:hover { background: #2d3050; }
    .table td, .table th { border-color: #2d3050; vertical-align: middle; }
    .badge-sudo { background: #7c3aed; }
    .progress { background: #2d3050; height: 6px; border-radius: 3px; }
    .btn-primary { background: #7c3aed; border-color: #7c3aed; }
    .btn-primary:hover { background: #6d28d9; border-color: #6d28d9; }
    .alert { border-radius: 8px; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url 'dashboard' %}">
      <i class="bi bi-shield-lock-fill"></i> PAMP
    </a>
    <span class="text-muted small ms-2">Pasargad Admins Management Panel</span>
    <div class="ms-auto d-flex align-items-center gap-3">
      {% if user.is_authenticated %}
        <span class="text-muted small"><i class="bi bi-person-circle"></i> {{ user.username }}</span>
        <a href="{% url 'logout' %}" class="btn btn-sm btn-outline-secondary">Logout</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container-fluid">
  <div class="row">
    <!-- Sidebar -->
    <div class="col-md-2 sidebar p-3">
      <ul class="nav flex-column">
        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"
             href="{% url 'dashboard' %}">
            <i class="bi bi-speedometer2 me-2"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/admin/" target="_blank">
            <i class="bi bi-gear me-2"></i>Django Admin
          </a>
        </li>
      </ul>
    </div>

    <!-- Main content -->
    <div class="col-md-10 p-4">
      {% if messages %}
        {% for msg in messages %}
          <div class="alert alert-{{ msg.tags }} alert-dismissible fade show">
            {{ msg }} <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
      {% block content %}{% endblock %}
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
