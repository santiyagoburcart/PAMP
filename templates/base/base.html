<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}PAMP{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --glass: rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.12);
      --glass-hover: rgba(255,255,255,0.11);
      --accent: #6366f1;
      --accent2: #8b5cf6;
      --accent3: #06b6d4;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --text: #f1f5f9;
      --muted: rgba(241,245,249,0.5);
      --radius: 16px;
      --radius-sm: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 0% 0%, rgba(99,102,241,0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 100% 0%, rgba(139,92,246,0.2) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 100%, rgba(6,182,212,0.15) 0%, transparent 60%),
        linear-gradient(135deg, #0a0a1a 0%, #0d0d2b 50%, #0a1628 100%);
      color: var(--text);
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
      top: -200px; left: -200px;
      border-radius: 50%;
      animation: float 8s ease-in-out infinite;
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(6,182,212,0.1) 0%, transparent 70%);
      bottom: -150px; right: -150px;
      border-radius: 50%;
      animation: float 10s ease-in-out infinite reverse;
      pointer-events: none; z-index: 0;
    }
    @keyframes float {
      0%, 100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(30px, 20px) scale(1.05); }
    }

    .glass {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
    }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    .layout { display: flex; min-height: 100vh; position: relative; z-index: 1; }

    .sidebar {
      width: 240px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(30px);
      border-right: 1px solid var(--glass-border);
      display: flex; flex-direction: column;
      padding: 28px 0;
      position: fixed; height: 100vh; top: 0; left: 0;
      transition: transform .3s ease;
      z-index: 100;
    }
    .sidebar-logo {
      padding: 0 24px 32px;
      font-size: 18px; font-weight: 700;
      display: flex; align-items: center; gap: 10px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      box-shadow: 0 0 20px rgba(99,102,241,0.4);
    }
    .logo-text {
      background: linear-gradient(135deg, #fff, rgba(255,255,255,0.7));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 24px;
      color: var(--muted);
      text-decoration: none; font-size: 13px; font-weight: 500;
      transition: all .2s;
      border-left: 2px solid transparent;
      margin: 1px 0;
    }
    .nav a:hover { color: var(--text); background: var(--glass); }
    .nav a.active {
      color: var(--text);
      background: linear-gradient(90deg, rgba(99,102,241,0.2), transparent);
      border-left-color: var(--accent);
    }
    .nav-icon { width: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .sidebar-footer {
      padding: 20px 24px;
      border-top: 1px solid var(--glass-border);
      margin-top: auto;
    }
    .sidebar-footer .username { margin-bottom: 6px; font-size: 12px; color: var(--text); font-weight: 600; }
    .sidebar-footer a {
      color: var(--muted); text-decoration: none; font-size: 12px;
      transition: color .2s; display: flex; align-items: center; gap: 8px;
    }
    .sidebar-footer a:hover { color: var(--danger); }

    /* Sidebar overlay for mobile */
    .sidebar-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      z-index: 99;
    }
    .sidebar-overlay.open { display: block; }

    .main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; }
    .topbar {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      padding: 14px 32px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .topbar-title { font-size: 15px; font-weight: 600; }
    .content { padding: 32px; flex: 1; }

    /* Mobile hamburger button — hidden on desktop */
    .mobile-menu-btn {
      display: none;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      width: 40px; height: 40px;
      color: var(--text);
      cursor: pointer;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ── Stats ──────────────────────────────────────────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px; margin-bottom: 32px;
    }
    .stat-card {
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 20px 22px;
      position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .stat-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }
    .stat-card .value { font-size: 26px; font-weight: 700; margin-top: 6px; }
    .stat-card .value.accent { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .stat-card .value.success { color: var(--success); }
    .stat-card .value.warning { color: var(--warning); }
    .stat-card .value.danger { color: var(--danger); }
    .stat-card .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* ── Buttons ────────────────────────────────────────────────────────── */
    .btn {
      padding: 10px 18px;
      border-radius: 12px;
      border: none;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: all .25s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex; align-items: center; gap: 8px;
      text-decoration: none;
      position: relative; overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.12), transparent);
      opacity: 0; transition: opacity .25s;
    }
    .btn:hover::after { opacity: 1; }
    .btn:active { transform: scale(.97); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 4px 16px rgba(99,102,241,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    .btn-primary:hover {
      box-shadow: 0 6px 24px rgba(99,102,241,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }
    .btn-glass {
      background: var(--glass); color: var(--text);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .btn-glass:hover {
      background: var(--glass-hover);
      border-color: rgba(255,255,255,0.25);
      transform: translateY(-1px);
    }
    .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 8px; }

    /* Action buttons */
    .btn-danger-glass {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      padding: 13px 18px;
      border-radius: 12px;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: all .25s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: center;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .btn-danger-glass:hover {
      background: rgba(239,68,68,0.2);
      border-color: rgba(239,68,68,0.5);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(239,68,68,0.25);
    }
    .btn-danger-glass:active { transform: scale(.97); }

    .btn-success-glass {
      background: rgba(16,185,129,0.12);
      border: 1px solid rgba(16,185,129,0.3);
      color: #6ee7b7;
      padding: 13px 18px;
      border-radius: 12px;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: all .25s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: center;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .btn-success-glass:hover {
      background: rgba(16,185,129,0.2);
      border-color: rgba(16,185,129,0.5);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(16,185,129,0.25);
    }
    .btn-success-glass:active { transform: scale(.97); }

    /* Limit preset buttons */
    .limit-group { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; }
    .limit-btn {
      padding: 8px 16px;
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 10px; color: var(--text);
      font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all .2s;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .limit-btn:hover { transform: translateY(-1px); border-color: var(--accent); color: #c7d2fe; }
    .limit-btn.set:hover { border-color: rgba(99,102,241,0.6); }
    .limit-btn.add { color: #6ee7b7; border-color: rgba(16,185,129,0.3); }
    .limit-btn.add:hover { border-color: rgba(16,185,129,0.6); }
    .custom-limit-wrap { display: flex; gap: 8px; align-items: center; margin-top: 10px; flex-wrap: wrap; }

    /* ── Inputs ─────────────────────────────────────────────────────────── */
    .input {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 8px 14px; font-size: 13px;
      outline: none; transition: all .2s;
      backdrop-filter: blur(10px);
    }
    .input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
    .input::placeholder { color: var(--muted); }

    /* ── Card / table ───────────────────────────────────────────────────── */
    .card {
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius); overflow: hidden;
    }
    .card-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: space-between;
      font-size: 13px; font-weight: 600;
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: rgba(255,255,255,0.04); }
    th {
      padding: 12px 16px; text-align: left;
      font-size: 10px; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: .6px;
    }
    td { padding: 14px 16px; border-top: 1px solid rgba(255,255,255,0.05); vertical-align: middle; }
    tr:hover td { background: rgba(255,255,255,0.03); }
    .username-cell a { color: var(--text); text-decoration: none; font-weight: 600; transition: color .2s; }
    .username-cell a:hover { color: var(--accent); }

    /* ── Badge ──────────────────────────────────────────────────────────── */
    .badge {
      display: inline-block; padding: 3px 10px;
      border-radius: 20px; font-size: 11px; font-weight: 600;
    }
    .badge-active { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
    .badge-disabled { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
    .badge-sudo { background: rgba(99,102,241,0.2); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.3); }

    /* ── Progress ───────────────────────────────────────────────────────── */
    .progress-wrap { display: flex; align-items: center; gap: 8px; }
    .progress-track { flex: 1; height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; min-width: 60px; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }
    .progress-pct { font-size: 11px; color: var(--muted); min-width: 34px; text-align: right; }

    /* ── Limit / action results ─────────────────────────────────────────── */
    .action-result {
      padding: 8px 16px; border-radius: var(--radius-sm);
      font-size: 13px; backdrop-filter: blur(10px); display: inline-block; margin-top: 8px;
    }
    .action-result.success { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
    .action-result.error { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }

    /* ── Portal ─────────────────────────────────────────────────────────── */
    .portal-hero {
      background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.15));
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: var(--radius);
      padding: 32px; margin-bottom: 28px;
      position: relative; overflow: hidden;
    }
    .portal-hero::before {
      content: '';
      position: absolute; top: -50%; right: -10%;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(139,92,246,0.2), transparent 70%);
      border-radius: 50%;
    }
    .portal-hero-name { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    .portal-hero-sub { color: var(--muted); font-size: 14px; }

    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    .detail-section {
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius); padding: 22px;
    }
    .detail-section h3 { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 16px; }
    .detail-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 13px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row .key { color: var(--muted); }
    .detail-row .val { font-weight: 500; }

    .formula-box {
      background: linear-gradient(135deg, rgba(245,158,11,0.1), rgba(245,158,11,0.05));
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: var(--radius); padding: 20px 24px; margin-bottom: 28px;
    }
    .formula-box .formula-title { font-size: 10px; color: var(--warning); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 10px; }
    .formula-box .formula-expr { font-size: 13px; color: var(--text); font-family: monospace; }
    .formula-box .formula-result { font-size: 22px; color: var(--warning); font-weight: 700; margin-top: 10px; text-shadow: 0 0 20px rgba(245,158,11,0.4); font-family: monospace; }

    .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .empty { text-align: center; padding: 60px; color: var(--muted); }

    /* ── Responsive breakpoints ─────────────────────────────────────────── */
    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main { margin-left: 0; }
      .mobile-menu-btn { display: flex; }
      .content { padding: 16px; }
      .topbar { padding: 12px 16px; }
      .stats-row { grid-template-columns: 1fr 1fr; gap: 10px; }
      .detail-grid { grid-template-columns: 1fr; }
      .card { overflow-x: auto; }
      table { min-width: 580px; }
      .portal-hero-name { font-size: 22px; }
      .stat-card .value { font-size: 22px; }
      .portal-hero { padding: 22px; }
    }
    @media (max-width: 480px) {
      .stats-row { grid-template-columns: 1fr; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .toolbar form { flex-direction: column; }
      .input { width: 100%; }
      .custom-limit-wrap { flex-direction: column; align-items: stretch; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </div>
      <span class="logo-text">PAMP</span>
    </div>
    <nav class="nav">
      {% if user.is_superuser or user.is_staff %}
      <a href="{% url 'dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
        </span>
        Dashboard
      </a>
      {% endif %}
      <a href="{% url 'portal' %}" class="{% if request.resolver_match.url_name == 'portal' %}active{% endif %}">
        <span class="nav-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </span>
        My Panel
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="username">{{ user.username }}</div>
      <a href="{% url 'logout' %}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </a>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="mobile-menu-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="topbar-title">{% block topbar_title %}PAMP{% endblock %}</span>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span id="sync-status"></span>
        {% if user.is_superuser %}
        <button class="btn btn-glass"
          hx-post="{% url 'trigger_sync' %}"
          hx-target="#sync-status"
          hx-swap="innerHTML"
          hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          <span class="btn-label">Sync</span>
        </button>
        {% endif %}
      </div>
    </div>
    <div class="content">
      {% block content %}{% endblock %}
    </div>
  </div>
</div>

<!-- Confirm Modal -->
<div id="confirm-modal" style="
  display:none;position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,0.65);backdrop-filter:blur(10px);
  align-items:center;justify-content:center;padding:20px;
">
  <div style="
    background:linear-gradient(135deg,rgba(28,30,52,0.98),rgba(18,20,38,0.98));
    border:1px solid var(--glass-border);
    border-radius:24px;padding:32px;width:100%;max-width:420px;
    box-shadow:0 24px 70px rgba(0,0,0,0.55);
    animation:modal-in .25s cubic-bezier(0.34,1.56,0.64,1);
  ">
    <div style="font-size:36px;text-align:center;margin-bottom:16px;" id="modal-icon">⚡</div>
    <div style="font-size:18px;font-weight:700;text-align:center;margin-bottom:8px;color:#f1f5f9;" id="modal-title">Confirm Action</div>
    <div style="font-size:13px;color:rgba(241,245,249,0.6);text-align:center;margin-bottom:28px;line-height:1.7;" id="modal-body"></div>
    <div style="display:flex;gap:12px;">
      <button onclick="closeModal()" style="
        flex:1;padding:13px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);
        background:rgba(255,255,255,0.06);color:rgba(241,245,249,0.7);
        font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;
      " onmouseover="this.style.background='rgba(255,255,255,0.1)'"
         onmouseout="this.style.background='rgba(255,255,255,0.06)'">
        Cancel
      </button>
      <button id="modal-confirm-btn" style="
        flex:1;padding:13px;border-radius:12px;border:none;
        background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;
        font-size:14px;font-weight:600;cursor:pointer;
        box-shadow:0 4px 16px rgba(99,102,241,0.4);transition:all .2s;
      " onmouseover="this.style.transform='translateY(-1px)'"
         onmouseout="this.style.transform='translateY(0)'">
        Confirm
      </button>
    </div>
  </div>
</div>

<!-- Loading Overlay -->
<div id="loading-overlay" style="
  display:none;position:fixed;inset:0;z-index:2000;
  background:rgba(5,7,20,0.75);backdrop-filter:blur(12px);
  align-items:center;justify-content:center;
">
  <div style="background:var(--glass);backdrop-filter:blur(30px);border:1px solid var(--glass-border);border-radius:24px;padding:40px 48px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.4);">
    <div class="spinner" style="width:54px;height:54px;margin:0 auto 20px;border:3px solid rgba(99,102,241,0.15);border-top-color:#8b5cf6;border-right-color:#6366f1;border-radius:50%;animation:spin 0.7s linear infinite;"></div>
    <div id="loading-text" style="color:#f1f5f9;font-size:14px;font-weight:600;letter-spacing:.3px;">Processing…</div>
  </div>
</div>

<!-- Result Popup -->
<div id="result-popup" style="
  display:none;position:fixed;inset:0;z-index:2100;
  background:rgba(5,7,20,0.7);backdrop-filter:blur(12px);
  align-items:center;justify-content:center;padding:20px;
">
  <div style="background:linear-gradient(135deg,rgba(28,30,52,0.98),rgba(18,20,38,0.98));border:1px solid var(--glass-border);border-radius:24px;padding:36px 32px;width:100%;max-width:400px;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,0.55);animation:modal-in .3s cubic-bezier(0.34,1.56,0.64,1);">
    <div id="result-icon-wrap" style="width:72px;height:72px;margin:0 auto 20px;border-radius:50%;display:flex;align-items:center;justify-content:center;">
      <div id="result-icon" style="font-size:36px;font-weight:700;line-height:1;"></div>
    </div>
    <div id="result-title" style="font-size:19px;font-weight:700;margin-bottom:8px;color:#f1f5f9;"></div>
    <div id="result-message" style="font-size:14px;color:rgba(241,245,249,0.6);margin-bottom:28px;line-height:1.6;"></div>
    <button onclick="closeResultPopup()" style="width:100%;padding:13px;border-radius:14px;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(99,102,241,0.4);transition:all .2s;">OK</button>
  </div>
</div>

<style>
@keyframes modal-in {
  from { opacity:0; transform:scale(.88) translateY(16px); }
  to   { opacity:1; transform:scale(1)   translateY(0);    }
}
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes pulse {
  0%, 100% { opacity:1; transform:scale(1); }
  50%       { opacity:.5; transform:scale(.85); }
}
</style>

<script>
/* ── Sidebar toggle ───────────────────────────────────────────────────── */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}

/* ── Confirm modal ────────────────────────────────────────────────────── */
let _modalCallback = null;

function showConfirmModal(icon, title, body, confirmLabel, confirmColor, callback) {
  document.getElementById('modal-icon').textContent = icon;
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  const btn = document.getElementById('modal-confirm-btn');
  btn.textContent = confirmLabel || 'Confirm';
  btn.style.background = confirmColor || 'linear-gradient(135deg,#6366f1,#8b5cf6)';
  _modalCallback = callback;
  document.getElementById('confirm-modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('confirm-modal').style.display = 'none';
  _modalCallback = null;
}

document.getElementById('modal-confirm-btn').addEventListener('click', function() {
  if (_modalCallback) _modalCallback();
  closeModal();
});

document.getElementById('confirm-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

/* ── Limit confirm helper ─────────────────────────────────────────────── */
function confirmSetLimit(username, action, valueGb, targetId, csrfToken) {
  const gbNum = parseFloat(valueGb);
  const gbLabel = gbNum >= 1000 ? (gbNum / 1000).toFixed(1) + ' TB' : gbNum + ' GB';
  const isSet = action === 'set';
  const color = isSet
    ? 'linear-gradient(135deg,#6366f1,#8b5cf6)'
    : 'linear-gradient(135deg,#059669,#10b981)';
  showConfirmModal(
    isSet ? '⚡' : '➕',
    isSet ? 'Set PAMP Limit' : 'Add to PAMP Limit',
    (isSet ? 'Set limit to' : 'Add') +
      ' <strong style="color:#f1f5f9">' + gbLabel + '</strong> for admin' +
      ' <strong style="color:#a5b4fc">' + username + '</strong>?',
    isSet ? 'Set ' + gbLabel : 'Add ' + gbLabel,
    color,
    function() {
      htmx.ajax('POST', '/panel/' + username + '/set-limit/', {
        target: '#' + targetId,
        swap: 'innerHTML',
        values: { action: action, value_gb: gbNum, csrfmiddlewaretoken: csrfToken }
      });
    }
  );
}

/* ── Loading overlay ──────────────────────────────────────────────────── */
function showLoading(text) {
  document.getElementById('loading-text').textContent = text || 'Processing…';
  document.getElementById('loading-overlay').style.display = 'flex';
}
function hideLoading() {
  document.getElementById('loading-overlay').style.display = 'none';
}

/* ── Result popup ─────────────────────────────────────────────────────── */
function showResultPopup(success, title, message) {
  hideLoading();
  const iconWrap = document.getElementById('result-icon-wrap');
  const iconEl   = document.getElementById('result-icon');
  iconEl.textContent = success ? '✓' : '✕';
  iconEl.style.color = success ? '#10b981' : '#ef4444';
  iconWrap.style.background = success
    ? 'radial-gradient(circle, rgba(16,185,129,0.25), rgba(16,185,129,0.05))'
    : 'radial-gradient(circle, rgba(239,68,68,0.25), rgba(239,68,68,0.05))';
  document.getElementById('result-title').textContent = title || (success ? 'Success' : 'Failed');
  document.getElementById('result-message').textContent = message || '';
  const popup = document.getElementById('result-popup');
  popup.style.display = 'flex';
  popup._shouldReload = success;
}
function closeResultPopup() {
  const popup = document.getElementById('result-popup');
  popup.style.display = 'none';
  if (popup._shouldReload) window.location.reload();
}

/* ── HTMX hooks ───────────────────────────────────────────────────────── */
document.addEventListener('htmx:beforeRequest', function(e) {
  const elt = e.detail.elt;
  if (elt && (elt.hasAttribute('hx-post') || elt.closest('[hx-post]'))) {
    showLoading('Processing your request…');
  }
});
document.addEventListener('htmx:afterRequest', function(e) {
  hideLoading();
  const resp = e.detail.xhr.responseText || '';
  const cleanMsg = resp.replace(/<[^>]+>/g, '').trim();
  if (e.detail.successful) {
    if (resp.includes('success') || resp.includes('✓') || resp.includes('✅') || resp.includes('🔒') || resp.includes('👥')) {
      showResultPopup(true, 'Done', cleanMsg || 'Action completed successfully');
    } else if (resp.includes('error') || resp.includes('✗') || resp.includes('❌') || resp.includes('Failed')) {
      showResultPopup(false, 'Failed', cleanMsg || 'Action failed');
    }
  } else {
    showResultPopup(false, 'Error', 'Request failed. Please try again.');
  }
});
document.addEventListener('htmx:responseError', function() {
  showResultPopup(false, 'Error', 'Server error. Please try again.');
});
</script>
</body>
</html>
