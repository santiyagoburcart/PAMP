server {
    listen 80;
    server_name pamp.caspinxp.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name pamp.caspinxp.com;
    client_max_body_size 20M;

    ssl_certificate /etc/letsencrypt/live/pamp.caspinxp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pamp.caspinxp.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    # Docker's embedded DNS — re-resolve service hostnames at runtime (valid=10s)
    resolver 127.0.0.11 valid=10s;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
    }

    location /phpmyadmin/ {
        # phpmyadmin rarely restarts; keep as static upstream to avoid URI stripping issues
        proxy_pass http://phpmyadmin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_redirect off;
    }

    location / {
        # Variable proxy_pass forces nginx to use the resolver on every request,
        # so a restarted web container is picked up within resolver valid= TTL
        set $web_upstream http://web:8000;
        proxy_pass $web_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cookie_path / "/; SameSite=Lax";
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_redirect off;
    }
}
